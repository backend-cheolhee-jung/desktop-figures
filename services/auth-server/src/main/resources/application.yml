spring:
  application:
    name: auth-server
  datasource:
    # 민감값은 ENC(암호화된값) 형태로 저장. 복호화 키: JASYPT_ENCRYPTOR_PASSWORD 환경변수
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/desktop_figures}
    username: ${DB_USERNAME:postgres}
    password: ENC(${DB_PASSWORD_ENC:개발용평문비밀번호})
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    table: flyway_schema_history_auth   # admin-server와 분리된 히스토리 테이블
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ENC(${JWT_SECRET_ENC:개발용평문시크릿최소32자이상필요})
  access-expiration: 900000       # 15분
  refresh-expiration: 604800000   # 7일

jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator
    # 복호화 키는 반드시 환경변수로 주입: JASYPT_ENCRYPTOR_PASSWORD=<master-key>
    # 절대 소스코드나 yml에 하드코딩하지 말 것
